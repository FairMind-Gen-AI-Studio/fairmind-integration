name: Gemini CLI Code Review (FairMind)

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  review:
    uses: FairMind-Gen-AI-Studio/fairmind-integration/.github/workflows/gemini-cli-review.yml@main
    with:
      fairmind_project_id: $default-value$
    secrets:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      FAIRMIND_API_KEY: ${{ secrets.FAIRMIND_API_KEY }}
